name: Azure OIDC Login Sample

on: [push]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required to fetch the OIDC token
      contents: read
    steps:
    - name: 'Azure CLI Login'
      uses: [azure/login@v2](https://github.com/marketplace/actions/azure-login)
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    
    - name: 'Run Azure CLI command'
      uses: [azure/cli@v2](https://github.com/marketplace/actions/azure-cli-action)
      with:
        inlineScript: |
          az account show
          az webapp list --query "[?state=='Running']"
